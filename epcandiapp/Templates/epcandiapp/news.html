{% extends "epcandiapp/base.html" %}
{% block page_title %}EPC&I NEWS{% endblock %}
{% block content %}
<div class="list-toolbar">NEWS</div>
{% for i in News %}
<div class="list-article-header">{{ i.heading }}</div>
<div class="list-article-presci">{{ i.news|linebreaks }}</div>
{% if not forloop.last %}<div class="list-seperator">*****</div>{% endif %}
{% empty %}
<div class="list-article-presci">No news available.</div>
{% endfor %}
{% endblock %}
