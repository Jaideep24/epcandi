{% if page_obj and page_obj.paginator.num_pages > 1 %}
<div class="pagination-wrap">
    {% if page_obj.has_previous %}
    <a href="?q={{ q|urlencode }}&page_size={{ page_size }}&page={{ page_obj.previous_page_number }}" class="pager-link">Previous</a>
    {% endif %}

    {% for num in page_obj.paginator.page_range %}
        {% if page_obj.number == num %}
        <span class="pager-selected">{{ num }}</span>
        {% else %}
        <a href="?q={{ q|urlencode }}&page_size={{ page_size }}&page={{ num }}" class="pager-link">{{ num }}</a>
        {% endif %}
    {% endfor %}

    {% if page_obj.has_next %}
    <a href="?q={{ q|urlencode }}&page_size={{ page_size }}&page={{ page_obj.next_page_number }}" class="pager-link">Next</a>
    {% endif %}
</div>
{% endif %}
